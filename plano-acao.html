<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plano de Ação</title>
  <link rel="stylesheet" href="css/styles.css?v=2" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
  <style>
    .action-header {
      display: grid;
      grid-template-columns: 1fr 160px 140px 130px 40px;
      gap: 12px;
      padding: 0 0 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .action-header span {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 160px 140px 130px 40px;
      gap: 12px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      animation: fadeIn 0.3s ease;
    }

    .action-row:last-child {
      border-bottom: none;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
    }

    .summary-strip {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .summary-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      font-size: 13px;
    }

    .summary-pill .pill-num {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-primary);
    }

    .summary-pill .pill-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .date-input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 8px 10px;
      width: 100%;
      outline: none;
      transition: border-color var(--transition);
    }

    .date-input:focus {
      border-color: var(--border-focus);
    }

    .date-input::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo" style="justify-content: center; width: 100%;">
          <img src="logonova.png" alt="San Marino Logo" style="max-height: 40px; width: auto;" />
        </div>
        <div style="margin-top: 14px; width: 100%;">
          <select id="store-select" style="background: var(--bg-base); border: 1px solid var(--border); color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; padding: 8px 12px; width: 100%; border-radius: 8px; cursor: pointer; outline: none; text-transform: uppercase; letter-spacing: 0.5px; text-align: center;">
            <option value="carregando">Carregando...</option>
          </select>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label" id="nav-label-admin" style="display:none">Painel Admin</div>
        <a class="nav-item" id="nav-back-admin" href="admin.html" style="display:none">
          <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12"/></svg>
          Visão Geral
        </a>
        <div class="nav-section-label" style="margin-top:16px">Principal</div>
        <a class="nav-item" href="dashboard.html">
          <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18" />
          </svg>
          Dashboard
        </a>
        <div class="nav-section-label" style="margin-top:16px">Óticas</div>
        <a class="nav-item" href="leads.html">
          <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0" />
          </svg>
          🎯 Leads
        </a>
        <a class="nav-item" href="vendedores.html">
          <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          👥 Vendedores
        </a>
        <a class="nav-item" href="estoque.html">
          <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10" />
          </svg>
          📦 Estoque
        </a>
        <a class="nav-item active" href="plano-acao.html">
          <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
          📋 Plano de Ação

      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">G</div>
          <div class="user-details">
            <div class="user-name" id="user-name">Gerente</div>
            <div class="user-role" id="user-role">Loja</div>
          </div>
          <button class="btn-logout" id="btn-logout" title="Sair">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <div class="header-title">
          <h1>📋 Plano de Ação</h1>
          <p id="header-subtitle">Ações da semana com responsáveis e prazos</p>
        </div>
        <div class="header-actions">
          <div class="date-picker-container" style="position: relative; display: flex; align-items: center; background: rgba(192,57,43,0.08); border: 1px solid rgba(192,57,43,0.18); border-radius: 30px; padding: 8px 16px; gap: 8px; color: var(--primary); font-size: 13px; font-weight: 600; cursor: pointer; height: 38px;">
            <span>📅</span>
            <input type="text" id="date-select" placeholder="Selecione o dia..." style="background: transparent; border: none; color: inherit; font-size: inherit; font-weight: 600; outline: none; cursor: pointer; width: 110px; text-align: center;" readonly />
          </div>
          <button class="btn-save" id="btn-save">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
            </svg>
            Salvar
          </button>
        </div>
      </header>

      <div class="page-content fade-in">

        <!-- Resumo de status -->
        <div class="summary-strip" id="summary-strip">
          <div class="summary-pill">
            <div>
              <div class="pill-num" id="sum-total">0</div>
              <div class="pill-label">Total</div>
            </div>
          </div>
          <div class="summary-pill" style="border-color:rgba(243,156,18,0.3)">
            <div>
              <div class="pill-num" id="sum-pendente" style="color:var(--warning)">0</div>
              <div class="pill-label">Pendentes</div>
            </div>
          </div>
          <div class="summary-pill" style="border-color:rgba(41,128,185,0.3)">
            <div>
              <div class="pill-num" id="sum-andamento" style="color:var(--info)">0</div>
              <div class="pill-label">Em andamento</div>
            </div>
          </div>
          <div class="summary-pill" style="border-color:rgba(39,174,96,0.3)">
            <div>
              <div class="pill-num" id="sum-concluido" style="color:var(--success)">0</div>
              <div class="pill-label">Concluídas</div>
            </div>
          </div>
        </div>

        <!-- Lista de ações -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">
              <div class="card-title-icon" style="background:rgba(192,57,43,0.15)">📋</div>
              Ações da Semana
            </div>
          </div>
          <div class="card-body">
            <div class="action-header">
              <span>Ação</span>
              <span>Responsável</span>
              <span>Prazo</span>
              <span>Status</span>
              <span></span>
            </div>
            <div id="acoes-list"></div>
            <button class="btn-add" id="add-acao">
              <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
              </svg>
              Adicionar Ação
            </button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
  </div>
  <div id="toast-container" class="toast-container"></div>

  <script type="module">
    import { auth, db, LOJAS } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { showToast, saveData, loadData, getInitials, setupStoreSelector } from './js/app.js?v=4';

    let userLoja = '', userData = null, diaId = '';
    let acoes = [];
    let canWrite = false;

    // ---- Auth Guard ----
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      const snap = await getDoc(doc(db, 'usuarios', user.uid));
      if (!snap.exists()) { window.location.href = 'index.html'; return; }
      userData = snap.data();
      userData.role = 'admin'; // Todos os usuários têm acesso de admin

      let activeLoja = sessionStorage.getItem('activeLoja');
      if (!activeLoja || activeLoja === 'grupo') {
        activeLoja = 'matriz';
        sessionStorage.setItem('activeLoja', activeLoja);
      }

      if (userData.role === 'admin' && activeLoja === 'grupo') {
        window.location.href = 'admin.html';
        return;
      }

      userLoja = activeLoja;
      canWrite = true; // Qualquer usuário logado e aprovado pode gravar na loja ativa

      const lojaLabel = LOJAS[userLoja] || userLoja;
      setupStoreSelector(userData.role, 'plano_acao');
      document.getElementById('user-name').textContent = userData.nome || 'Gerente';
      document.getElementById('user-role').textContent = userData.role === 'admin' ? 'Administrador' : lojaLabel;
      document.getElementById('user-avatar').textContent = getInitials(userData.nome || 'G');

      // Mostrar botão de voltar ao painel admin se for administrador
      if (userData.role === 'admin') {
        document.getElementById('nav-label-admin').style.display = '';
        const backBtn = document.getElementById('nav-back-admin');
        backBtn.style.display = '';
        backBtn.addEventListener('click', (e) => {
          e.preventDefault();
          sessionStorage.removeItem('activeLoja');
          window.location.href = 'admin.html';
        });
      }

      // Oculta botão salvar se sem permissão
      if (!canWrite) document.getElementById('btn-save').style.display = 'none';

      const now = new Date();

      // Inicializa Flatpickr
      flatpickr("#date-select", {
        dateFormat: "d/m/Y",
        locale: "pt",
        defaultDate: now,
        onChange: async function(selectedDates) {
          if (selectedDates.length === 1) {
            updateDiaId();
            const formatDate = (d) => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
            document.getElementById('header-subtitle').textContent = `${lojaLabel} — Dia ${formatDate(selectedDates[0])}`;
            await loadPlano();
          }
        }
      });

      updateDiaId();
      const formatDate = (d) => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
      document.getElementById('header-subtitle').textContent = `${lojaLabel} — Dia ${formatDate(now)}`;
      await loadPlano();

      document.getElementById('btn-save').addEventListener('click', savePlano);
      document.getElementById('btn-logout').addEventListener('click', async () => {
        const { logoutUser } = await import('./js/auth.js');
        logoutUser();
      });
      document.getElementById('add-acao').addEventListener('click', () => {
        acoes.push({ acao: '', responsavel: '', prazo: '', status: 'pendente' });
        renderAcoes();
      });
    });

    function updateDiaId() {
      const fpInput = document.getElementById('date-select');
      if (fpInput && fpInput._flatpickr && fpInput._flatpickr.selectedDates.length === 1) {
        const d = fpInput._flatpickr.selectedDates[0];
        diaId = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      } else {
        const now = new Date();
        diaId = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
      }
    }

    async function loadPlano() {
      const data = await loadData(userLoja, diaId, 'plano_acao');
      acoes = data?.acoes || [];
      renderAcoes();
    }

    const STATUS_OPTS = [
      { val: 'pendente', label: '⏳ Pendente', cls: 'badge-warning' },
      { val: 'andamento', label: '🔵 Em andamento', cls: 'badge-info' },
      { val: 'concluido', label: '✅ Concluído', cls: 'badge-success' },
    ];

    function renderAcoes() {
      const container = document.getElementById('acoes-list');
      if (!acoes.length) {
        container.innerHTML = `<div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px">
          <div style="font-size:32px;margin-bottom:12px">📋</div>
          Nenhuma ação registrada. Clique em "+ Adicionar Ação" para começar.
        </div>`;
        updateSummary();
        return;
      }

      container.innerHTML = acoes.map((a, i) => `
        <div class="action-row" id="row-${i}">
          <input type="text" class="td-input" placeholder="Descreva a ação..." value="${escHtml(a.acao || '')}"
            oninput="window._setAcao(${i},'acao',this.value)" />
          <input type="text" class="td-input" placeholder="Responsável" value="${escHtml(a.responsavel || '')}"
            oninput="window._setAcao(${i},'responsavel',this.value)" />
          <input type="date" class="date-input" value="${a.prazo || ''}"
            onchange="window._setAcao(${i},'prazo',this.value)" />
          <select class="status-select" onchange="window._setAcao(${i},'status',this.value)"
            style="${statusStyle(a.status)}">
            ${STATUS_OPTS.map(o => `<option value="${o.val}" ${a.status === o.val ? 'selected' : ''}>${o.label}</option>`).join('')}
          </select>
          <button class="btn-icon" onclick="window._removeAcao(${i})" title="Remover">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      `).join('');

      updateSummary();
    }

    function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    function statusStyle(s) {
      const styles = {
        pendente: 'color:var(--warning)',
        andamento: 'color:var(--info)',
        concluido: 'color:var(--success)',
      };
      return styles[s] || '';
    }

    function updateSummary() {
      document.getElementById('sum-total').textContent = acoes.length;
      document.getElementById('sum-pendente').textContent = acoes.filter(a => a.status === 'pendente').length;
      document.getElementById('sum-andamento').textContent = acoes.filter(a => a.status === 'andamento').length;
      document.getElementById('sum-concluido').textContent = acoes.filter(a => a.status === 'concluido').length;
    }

    window._setAcao = (i, k, v) => { acoes[i][k] = v; updateSummary(); };
    window._removeAcao = (i) => { acoes.splice(i, 1); renderAcoes(); };

    async function savePlano() {
      if (!canWrite) {
        showToast('Você não tem permissão para salvar nesta loja.', 'error');
        return;
      }
      const btn = document.getElementById('btn-save');
      btn.classList.add('saving');
      btn.textContent = 'Salvando...';
      try {
        await saveData(userLoja, diaId, 'plano_acao', { acoes });
        showToast('Plano de ação salvo! ✓', 'success');
      } catch (e) {
        showToast('Erro ao salvar.', 'error');
      } finally {
        btn.classList.remove('saving');
        btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg> Salvar`;
      }
    }
  </script>
</body>

</html>
